name: Go Tests

on:
  push:
    branches:
      - main
      - learning/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./playground/TaskService